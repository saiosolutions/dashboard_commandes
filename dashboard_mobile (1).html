<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>L'Oasis Food</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 100%;
      padding: 16px;
      padding-bottom: 40px;
    }
    .header {
      margin-bottom: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 16px;
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .header h1 {
      font-size: 24px;
      margin: 0 0 4px 0;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
      margin: 0;
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn-filter {
      background-color: #f0f0f0;
      color: #333;
    }
    .btn-filter.active {
      background-color: #007bff;
      color: white;
      font-weight: bold;
    }
    .btn-refresh {
      background-color: white;
      border: 1px solid #ddd;
      margin-left: auto;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }
    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 16px;
    }
    .commande-card {
      background: white;
      border: 2px solid #f0f0f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-touch-callout: none;
    }
    .commande-card:active {
      transform: scale(0.98);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      border-color: #007bff;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      align-items: center;
    }
    .card-numero {
      font-weight: bold;
      font-size: 16px;
      color: #333;
    }
    .card-prix {
      font-size: 20px;
      font-weight: bold;
      color: #007bff;
    }
    .card-client {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .card-client strong {
      color: #333;
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }
    .badge-livraison {
      background-color: #e3f2fd;
      color: #1976d2;
    }
    .badge-emporter {
      background-color: #fff3e0;
      color: #f57c00;
    }
    .badge-surplace {
      background-color: #f3e5f5;
      color: #7b1fa2;
    }
    .card-date {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.5);
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal.show {
      display: block;
    }
    .modal-wrapper {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 20px;
      max-width: 600px;
      width: 100%;
      margin: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      font-size: 20px;
      margin: 0;
      color: #333;
    }
    .btn-close {
      background: none;
      border: none;
      font-size: 36px;
      color: #666;
      cursor: pointer;
      padding: 0;
      width: 40px;
      height: 40px;
      line-height: 36px;
      -webkit-appearance: none;
      appearance: none;
    }
    .info-box {
      background-color: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .info-box-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 15px;
      color: #333;
    }
    .info-box-content {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    .articles-section {
      margin-bottom: 20px;
    }
    .section-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 16px;
      color: #333;
    }
    .article-item {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .article-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .article-nom {
      font-size: 14px;
      color: #333;
    }
    .article-prix {
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }
    .article-attributs {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }
    .article-attributs div {
      margin: 2px 0;
    }
    .article-instructions {
      font-size: 13px;
      color: #f57c00;
      margin-top: 6px;
      font-style: italic;
    }
    .total-box {
      border-top: 2px solid #ddd;
      padding-top: 16px;
      font-size: 20px;
      font-weight: bold;
      text-align: right;
      margin-top: 16px;
      color: #333;
    }
    .info-footer {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
      line-height: 1.6;
    }
    .error-message {
      background-color: #ffebee;
      color: #c62828;
      padding: 16px;
      border-radius: 8px;
      margin: 16px 0;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌮 L'Oasis Food</h1>
      <p>Gestion des commandes</p>
    </div>

    <div class="filters">
      <button class="btn btn-filter active" id="btn-all" onclick="setFilter('all')">Toutes</button>
      <button class="btn btn-filter" id="btn-today" onclick="setFilter('today')">Aujourd'hui</button>
      <button class="btn btn-refresh" onclick="loadCommandes()">🔄 Actualiser</button>
    </div>

    <div id="content">
      <div class="loading">Chargement...</div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-wrapper" onclick="closeModalOutside(event)">
      <div class="modal-content" id="modal-content" onclick="event.stopPropagation()">
        <!-- Contenu dynamique -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ CONFIGURATION - REMPLACE PAR TES VRAIES VALEURS!
    const SUPABASE_URL = 'https://ixpnsiyopebtcofntmoz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4cG5zaXlvcGVidGNvZm50bW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjM4NDYsImV4cCI6MjA5MjA5OTg0Nn0.9Hg3RtM46v2q-1Ga8_U5gfpfYIgtNvodofAO6rGdav4';  // ← METS TA VRAIE CLÉ ICI!
    const BUSINESS_ID = 'ac26fa55-c533-46e6-bd84-fef80ca7e649';

    // Variables globales
    let commandes = [];
    let currentFilter = 'all';
    let supabase;

    // Initialisation
    document.addEventListener('DOMContentLoaded', function() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">🔄 Initialisation...</div>';
      
      try {
        // Vérifier que Supabase est chargé
        if (typeof window.supabase === 'undefined') {
          showError('❌ Supabase n\'est pas chargé. Vérifiez votre connexion internet.');
          return;
        }
        
        // Vérifier la clé API
        if (SUPABASE_ANON_KEY === 'TA_CLE_ICI') {
          showError('⚠️ ATTENTION: Tu dois remplacer TA_CLE_ICI par ta vraie clé Supabase!<br><br>Ouvre le fichier avec Bloc-notes et cherche la ligne 249.');
          return;
        }
        
        content.innerHTML = '<div class="loading">✅ Supabase OK<br>📡 Connexion à la base...</div>';
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        content.innerHTML = '<div class="loading">⏳ Chargement des commandes...</div>';
        
        loadCommandes();
        
        // Auto-refresh toutes les 30 secondes
        setInterval(loadCommandes, 30000);
      } catch (error) {
        showError('❌ Erreur d\'initialisation:<br>' + error.message + '<br><br>Détails: ' + error.stack);
      }
    });

    // Chargement des commandes
    async function loadCommandes() {
      const content = document.getElementById('content');
      
      try {
        content.innerHTML = '<div class="loading">🔄 Chargement des commandes...</div>';
        
        const { data, error } = await supabase
          .from('commandes')
          .select(`
            *,
            client:client_id (nom, telephone, derniere_adresse_livraison),
            produits_commandes (
              quantite,
              total,
              attributs_choisis,
              instructions_particulieres,
              produit:produit_id (nom, prix)
            )
          `)
          .eq('business_id', BUSINESS_ID)
          .order('created_at', { ascending: false })
          .limit(50);

        if (error) {
          console.error('Erreur Supabase:', error);
          throw new Error('Supabase: ' + error.message + ' (Code: ' + error.code + ')');
        }
        
        console.log('Données reçues:', data);
        console.log('Nombre de commandes:', data ? data.length : 0);
        
        commandes = data || [];
        
        if (commandes.length === 0) {
          content.innerHTML = '<div class="no-data">✅ Connexion OK<br><br>Aucune commande trouvée pour ce business</div>';
        } else {
          renderCommandes();
        }
      } catch (error) {
        console.error('Erreur complète:', error);
        showError('❌ Erreur de chargement:<br><br>' + error.message + '<br><br>Vérifie que:<br>1. Ta clé API est correcte<br>2. Le BUSINESS_ID est correct<br>3. Les tables existent dans Supabase');
      }
    }

    // Filtrage
    function setFilter(filter) {
      currentFilter = filter;
      
      // Update buttons
      document.querySelectorAll('.btn-filter').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById('btn-' + filter).classList.add('active');
      
      renderCommandes();
    }

    // Affichage des commandes
    function renderCommandes() {
      const content = document.getElementById('content');
      
      // Filtrer
      let filtered = commandes;
      if (currentFilter === 'today') {
        const today = new Date().toISOString().split('T')[0];
        filtered = commandes.filter(cmd => cmd.created_at.startsWith(today));
      }

      // Afficher
      if (filtered.length === 0) {
        content.innerHTML = '<div class="no-data">Aucune commande</div>';
        return;
      }

      let html = '';
      filtered.forEach(cmd => {
        const typeBadge = cmd.type_livraison === 'livraison' ? 'livraison' : 
                         cmd.type_livraison === 'a_emporter' ? 'emporter' : 'surplace';
        
        const typeText = cmd.type_livraison === 'livraison' ? 
          `🛵 Livraison${cmd.adresse_livraison?.ville ? ' → ' + cmd.adresse_livraison.ville : ''}` :
          cmd.type_livraison === 'a_emporter' ? '🛍️ À emporter' : '🍽️ Sur place';

        html += `
          <div class="commande-card" onclick="openModal('${cmd.id}')">
            <div class="card-header">
              <span class="card-numero">#${cmd.numero_commande}</span>
              <span class="card-prix">${cmd.prix}€</span>
            </div>
            <div class="card-client">
              👤 <strong>${cmd.client?.nom || 'Client'}</strong> • 📞 ${cmd.client?.telephone || 'N/A'}
            </div>
            <div>
              <span class="badge badge-${typeBadge}">${typeText}</span>
            </div>
            <div class="card-date">
              ⏰ ${formatDate(cmd.created_at)}
            </div>
          </div>
        `;
      });

      content.innerHTML = html;
    }

    // Ouvrir modal
    function openModal(commandeId) {
      const cmd = commandes.find(c => c.id === commandeId);
      if (!cmd) return;

      const typeText = cmd.type_livraison === 'livraison' ? '🛵 Livraison' :
                      cmd.type_livraison === 'a_emporter' ? '🛍️ À emporter' : '🍽️ Sur place';

      let articlesHtml = '';
      if (cmd.produits_commandes && cmd.produits_commandes.length > 0) {
        cmd.produits_commandes.forEach(item => {
          let attributsHtml = '';
          if (item.attributs_choisis) {
            const attr = item.attributs_choisis;
            if (attr.viandes) {
              const viandes = Array.isArray(attr.viandes) ? attr.viandes.join(', ') : attr.viandes;
              attributsHtml += `<div>🥩 ${viandes}</div>`;
            }
            if (attr.sauces) {
              const sauces = Array.isArray(attr.sauces) ? attr.sauces.join(', ') : attr.sauces;
              attributsHtml += `<div>🌶️ ${sauces}</div>`;
            }
            if (attr.fromages) {
              const fromages = Array.isArray(attr.fromages) ? attr.fromages.join(', ') : attr.fromages;
              attributsHtml += `<div>🧀 ${fromages}</div>`;
            }
            if (attr.modifications) {
              const mods = Array.isArray(attr.modifications) ? attr.modifications.join(', ') : attr.modifications;
              attributsHtml += `<div>📝 ${mods}</div>`;
            }
          }

          const instructionsHtml = item.instructions_particulieres ? 
            `<div class="article-instructions">💬 ${item.instructions_particulieres}</div>` : '';

          articlesHtml += `
            <div class="article-item">
              <div class="article-header">
                <span class="article-nom"><strong>${item.quantite}x</strong> ${item.produit?.nom || 'Article'}</span>
                <span class="article-prix">${item.total}€</span>
              </div>
              ${attributsHtml ? `<div class="article-attributs">${attributsHtml}</div>` : ''}
              ${instructionsHtml}
            </div>
          `;
        });
      }

      const adresseHtml = cmd.adresse_livraison ? `
        <div class="info-box-content">
          ${cmd.adresse_livraison.rue || ''}<br>
          ${cmd.adresse_livraison.code_postal || ''} ${cmd.adresse_livraison.ville || ''}
        </div>
      ` : '<div class="info-box-content">Aucune adresse</div>';

      const modalHtml = `
        <div class="modal-header">
          <h2>Commande #${cmd.numero_commande}</h2>
          <button class="btn-close" onclick="closeModal()">×</button>
        </div>

        <div class="info-box">
          <div class="info-box-title">👤 Client</div>
          <div class="info-box-content">
            ${cmd.client?.nom || 'Client'}<br>
            <span style="color: #999;">${cmd.client?.telephone || 'N/A'}</span>
          </div>
        </div>

        <div class="info-box">
          <div class="info-box-title">${typeText}</div>
          ${adresseHtml}
        </div>

        <div class="articles-section">
          <div class="section-title">📦 Articles</div>
          ${articlesHtml || '<div class="no-data">Aucun article</div>'}
        </div>

        <div class="total-box">
          Total: ${cmd.prix}€
        </div>

        <div class="info-footer">
          <div>Reçue le: ${formatDate(cmd.created_at)}</div>
          <div>Statut: ${cmd.statut || 'N/A'}</div>
        </div>
      `;

      document.getElementById('modal-content').innerHTML = modalHtml;
      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    // Fermer modal
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

    function closeModalOutside(event) {
      if (event.target.classList.contains('modal-wrapper')) {
        closeModal();
      }
    }

    // Formater date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString('fr-FR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Afficher erreur
    function showError(message) {
      document.getElementById('content').innerHTML = 
        `<div class="error-message">${message}</div>`;
    }
  </script>
</body>
</html>
